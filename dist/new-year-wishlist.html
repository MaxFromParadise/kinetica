<!DOCTYPE html>
<html lang="en">
	<link
		rel="stylesheet"
		href="styles/swiper-bundle.min.css"
	/>
	<link
		rel="preconnect"
		href="https://fonts.googleapis.com"
	/>
	<link
		rel="preconnect"
		href="https://fonts.gstatic.com"
		crossorigin
	/>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
		rel="stylesheet"
	/>
	<link
		rel="preload"
		href="fonts/Ampero-Bold.otf"
		as="font"
		type="font/otf"
		crossorigin
	/>
	<head>
	<meta charset="UTF-8" />
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0"
	/>
	<link
		rel="icon"
		type="image/png"
		href="img/logo-icon.png"
	/>
	<link
		rel="stylesheet"
		href="./styles/style.css"
	/>
	<title>KINETICA</title>
</head>

	<body class="new-year-wishlist">
		<main class="main">
			<div class="main__logo-decor">
				<img
					src="img/pages/new-year-wishlist/decor-logo.png"
					alt="kinetica decor"
				/>
			</div>
			<div class="main__bg">
				<video
					class="main__video-bg"
					autoplay
					muted
					loop
					playsinline
				>
					<source
						src="img/pages/new-year-wishlist/snow-fall.mp4"
						type="video/mp4"
					/>
				</video>
			</div>
			<div class="main__container">
				<div class="main__content">
					<div class="main__texts">
						<a
							href="/"
							class="main__kinetica"
						>
							<img
								src="img/pages/new-year-wishlist/kinetica.svg"
								alt="kinetica"
							/>
						</a>
						<h1 class="main__title">
							<img
								src="img/pages/new-year-wishlist/cepochka.svg"
								alt="Цепочка новогодних пожеланий"
							/>
						</h1>
					</div>
					<div class="main__buttons">
						<button
							data-getWish
							class="red-button main__button"
						>
							ПОЛУЧИТЬ ПОЖЕЛАНИЕ
							<span
								><svg
									width="31"
									height="34"
									viewBox="0 0 31 34"
									fill="none"
									xmlns="http://www.w3.org/2000/svg"
								>
									<path
										d="M14.8379 18.9063C15.1548 19.1835 15.5904 19.1835 15.9073 18.9063L27.1155 8.52973C27.3135 8.13368 27.2739 7.5 26.4818 7.5L4.30294 7.53961C3.70886 7.53961 3.2336 8.09408 3.66926 8.56934L14.8379 18.9063Z"
										fill="white"
									/>
									<path
										d="M27.2342 12.9656C27.2342 12.4508 26.6005 12.1735 26.2441 12.53L17.531 20.6094C16.9369 21.1639 16.1844 21.4412 15.3923 21.4412C14.6002 21.4412 13.8477 21.1639 13.2536 20.6094L4.50087 12.53C4.10482 12.1735 3.51074 12.4508 3.51074 12.9656C3.51074 16.0945 3.51074 23.263 3.51074 23.263C3.51074 24.57 4.58008 25.6393 5.88705 25.6393H24.8975C26.2045 25.6393 27.2738 24.57 27.2738 23.263C27.2342 23.263 27.2342 16.1341 27.2342 12.9656Z"
										fill="white"
									/>
								</svg>
							</span>
						</button>
						<button
							data-postWish
							class="red-button main__button"
						>
							ОСТАВИТЬ ПОЖЕЛАНИЕ
							<span
								><svg
									width="21"
									height="28"
									viewBox="0 0 21 28"
									fill="none"
									xmlns="http://www.w3.org/2000/svg"
								>
									<path
										d="M3.40084 22.5616C1.86126 23.9112 -0.561564 26.5465 2.06383 26.2908C5.34558 25.9712 12.3953 19.4717 11.4229 22.5616C10.4505 25.6515 14.8262 24.9057 17.3787 23.7336"
										stroke="white"
										stroke-width="1.8"
										stroke-linecap="round"
									/>
									<path
										d="M4.61664 14.8271L12.5243 5.01984C12.8709 4.58991 13.5005 4.5224 13.9304 4.86906L16.7015 7.10342C17.1315 7.45008 17.199 8.07963 16.8523 8.50957L8.95166 18.3082C8.80919 18.4849 8.61085 18.6078 8.38924 18.6569L5.54282 19.2867C4.90893 19.427 4.31152 18.9354 4.32706 18.2864L4.3954 15.4308C4.40067 15.2107 4.47844 14.9985 4.61664 14.8271Z"
										fill="white"
									/>
									<path
										d="M15.9441 0.778469L14.6545 2.3779C14.3078 2.80784 14.3753 3.4374 14.8053 3.78406L17.5764 6.01842C18.0063 6.36508 18.6359 6.29757 18.9825 5.86763L20.2721 4.2682C20.6188 3.83826 20.5513 3.2087 20.1214 2.86204L17.3502 0.627683C16.9203 0.281023 16.2908 0.348533 15.9441 0.778469Z"
										fill="white"
									/>
								</svg>
							</span>
						</button>
					</div>
				</div>
			</div>
			<div class="overlay"></div>
			<div class="wish">
				<div class="wish__letter">
					<div class="wish__close">
						<img
							src="img/pages/new-year-wishlist/close.svg"
							alt="close"
						/>
					</div>
					<div class="wish__paper">
						<p class="wish__text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Deleniti, eos?</p>
						<div class="wish__info"><span class="wish__name">Имя</span>, <span class="wish__city">Город</span></div>
					</div>
					<div class="wish__letter-front">
						<img
							src="img/pages/new-year-wishlist/letter-front.png"
							alt="letter front"
						/>
					</div>
					<div class="wish__letter-back">
						<img
							src="img/pages/new-year-wishlist/letter-back.png"
							alt="letter back"
						/>
					</div>
					<button
						data-postWish
						class="green-button wish__button"
					>
						ОСТАВИТЬ ПОЖЕЛАНИЕ
					</button>
				</div>
			</div>
			<div class="post-wish">
				<div class="post-wish__letter">
					<div class="post-wish__close">
						<img
							src="img/pages/new-year-wishlist/close.svg"
							alt="close"
						/>
					</div>
					<form class="post-wish__paper">
						<div class="post-wish__info">
							<input
								autocomplete="off"
								type="text"
								name="name"
								placeholder="Имя"
								class="post-wish__input"
								required
							/>
							<input
								autocomplete="off"
								type="text"
								name="city"
								placeholder="Город"
								class="post-wish__input"
								required
							/>
						</div>
						<div class="post-wish__wish">
							<input
								autocomplete="off"
								type="text"
								name="message"
								placeholder="Пожелание"
								class="post-wish__input"
								required
							/>
							<label class="post-wish__label">Осталось символов: <span class="post-wish__symbols">0</span>/250</label>
						</div>
						<div class="post-wish__bottom">
							<button
								class="green-button post-wish__button"
								type="submit"
							>
								Отправить
							</button>
							<div class="post-wish__mark">
								<img
									src="img/pages/new-year-wishlist/mark.png"
									alt="mark"
								/>
							</div>
						</div>
					</form>
				</div>
			</div>
			<div class="success-wish">
				<div class="success-wish__letter">
					<div class="success-wish__close">
						<img
							src="img/pages/new-year-wishlist/close.svg"
							alt="close"
						/>
					</div>
					<div class="success-wish__paper">Ваше пожелание успешно отправлено!</div>
				</div>
			</div>
		</main>
		<script src="js/swiper-bundle.min.js"></script>
		<script src="js/new-year-wishlist.js"></script>
	</body>
</html>
